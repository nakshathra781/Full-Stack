<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>myntra bag</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <button class="bag-button" onclick="CartQuantity++;document.querySelector('#cart-summary').innerText = `Your Bag has ${CartQuantity} items`;">Add to bag</button>
    
    <button class="wishlist" onclick="CartQuantity--;document.querySelector('#cart-summary').innerText = `Your Bag has ${CartQuantity} items`;">Move to Wishlist</button>
    <button class="bag-button" onclick="CartQuantity += 2;document.querySelector('#cart-summary').innerText = `Your Bag has ${CartQuantity} items`;">Add 1+1 Sale item</button>


    <h1 id="cart-summary"></h1>
<script>
   let CartQuantity = 0;
   document.querySelector('#cart-summary').innerText = `Your Bag has ${CartQuantity} items`;
</script>
</body>
</html>
