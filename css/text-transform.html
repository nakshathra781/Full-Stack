<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>text transfrom</title>
    <style>
        .text{
            color:rgb(10, 16, 21);
            text-transform: uppercase;
        }
        .text2{
            color:rgb(17, 11, 2);
            text-transform: lowercase;
        }
        .text3{
            color:rgb(16, 222, 154);
            text-transform: capitalize;
        }
    </style>
</head>
<body>
    <div class="text">this is text1</div>
    <div class="text2">this is text2</div>
    <div class="text3">this is text 3</div>
</body>
</html>
