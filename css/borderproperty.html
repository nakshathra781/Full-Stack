<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>border property</title>
    <!--border radius used to create rounded corners for elements-->
    <!--box sizing includes padding and border by giving border-box attribute-->
    <style>
        .box{
            height:50px;
            width:50px;
            margin:5px;
            padding:2px;
        }
        #one{
            border radius
            border:2px solid blanchedalmond;
            background-color: aquamarine;
        }
        #two{
            border:2px solid red;
            border-radius:15px 15px 15px 20px;
            background-color: aliceblue;
            box-sizing:border-box;
        }
    </style>
</head>
<body>
    <div id="one" class="box">box 1</div>
    <div id="two" class="box">box 2</div>

</body>
</html>
