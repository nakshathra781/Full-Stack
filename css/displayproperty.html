<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>diplay property</title>
    <style>
        .box{
            height:50px;
            width:50px;
            background-color: aqua;
            margin:5px;
            display:inline-block;
            /*accept all properties like height,width unlike inline*/

        }
        #box1{
           /*visibility: hidden;to overcome this we use display*/
           display: none;
        }
    </style>
</head>
<body>
    <div id="box1" class="box">one</div>
    <div class="box">two</div>
</body>
</html>
