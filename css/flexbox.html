<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>flex box</title>
    <!--arranging of elements in a block,if element sizes are bigger than container elements automatically shrinks it is used to build 
    responsive websites-->
    <style>
        *{
            margin:0;
            padding:0;
        }
        .box{
            height:150px;
            width:150px;
            border:5px solid black;
            margin:10px;
           
             }
             #heading{
                margin-left:50px;;
             }
           #container{
            height:600px;
            width:600px;
            padding:10px;
            margin:20px;
            border:2px solid black;
            background-color: azure;
            display:flex;
            flex-direction:row;
           
            justify-content:space-around;
            align-items: center;
           }
           #box1{
            background-color: antiquewhite;
           }
           #box2{
            background-color: aquamarine;
           }
           #box3{
            background-color: blue;
           }
           #box4{
            background-color: brown;
           }
            #box5{
            background-color: brown;
           }
            #box6{
            background-color: brown;
           }

    </style>
</head>
<body>
    <h1 id="heading">flex container</h1>
    <div id="container">
    <div id="box1" class="box">flex item 1</div>
    <div id="box2" class="box">flex item 2</div>
    <div id="box3" class="box">flex item 3</div>
    <div id="box4" class="box">flex item 4</div>
    <div id="box5" class="box">flex item 5</div>
    <div id="box6" class="box">flex item 6</div>
    </div>
</body>
</html>
