<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RelativeUnit-rem</title>
    <style>
        *{
            margin:0;
            padding:0;
            font-size:5px;
        }
        #first{
       height:100px;
       width:200px;
       background-color: antiquewhite;
       font-size:10px;
        }
        /*rem is according to root element*/
        #second{
            height:50%;
            width:50%;
            font-size:0.5rem;
            background-color: aliceblue;
        }
    </style>
</head>
<body>
    body text
    <div id="first">first div
        <div id="second">
            second div
        </div>
    </div>
    </body>
</html>
