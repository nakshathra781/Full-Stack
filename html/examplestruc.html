<!DOCTYPE html>
<html>
<head>
    <title>Full Structure Practice</title>
</head>

<body>

    <!-- HEADER -->
    <header>
        <h1>My Website</h1>
        <p>Welcome to my page</p>
    </header>

    <!-- MAIN -->
    <main>

        <!-- SECTION -->
        <section>
            <h2>About Me</h2>

            <!-- ARTICLE inside section -->
            <article>
                <h3>Introduction</h3>
                <p>I am learning HTML step by step.</p>
            </article>

            <article>
                <h3>My Skills</h3>
                <p>HTML, CSS, Java</p>
            </article>
        </section>

        <!-- ANOTHER SECTION -->
        <section>
            <h2>Projects</h2>

            <article>
                <h3>Project 1</h3>
                <p>This is my first project.</p>
            </article>

            <article>
                <h3>Project 2</h3>
                <p>This is my second project.</p>
            </article>
        </section>

        <!-- ASIDE (SIDE CONTENT) -->
        <aside>
            <h3>Quick Links</h3>
            <p>Home</p>
            <p>About</p>
            <p>Contact</p>
        </aside>

    </main>

    <!-- FOOTER -->
    <footer>
        <p>Contact: example@gmail.com</p>
    </footer>

</body>
</html>
