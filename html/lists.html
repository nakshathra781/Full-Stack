<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>lists practice</title>
</head>
<body>
    <!--ol stands for ordered list-->
  <ol type="A">
    <!--these are the list items written by tag li-->
    <li>c</li>
    <!--nested ordered list-->
    <ol type="i">
        <li>level 0</li>
        <li>level 1</li>
    </ol>
    <li>python</li>  
    <li>DBMS</li>
    <li>java</li>
    <li>os</li>
  </ol>  
  <ul>
    <li>sleeping</li>
    <li>eating</li>
    <li>drinking</li>
  </ul>
</body>
</html>
