<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tables practice</title>
    </head>
    <table border="1">
        <!--border defines outline of the table-->
        <!--caption is used for table headings it default set in the middle of the top-->
        <caption>Technologies</caption>
        <tr>
            <!--colspan attribue used to combine columns and rows aas 1 box-->
            <th colspan="4">techs im good at</th>
        </tr>
        <tr>
            <!--th stands for headings in the table-->
            <th>language</th>
            <th>grade yourself</th>
            <th>how long it takes to learn</th>
            <th>rate</th>
        </tr>
        <tr>
            <!--td stands for table data under th-->
            <td>c</td>
            <td>5/10</td>
            <td>1 year</td>
            <td>4</td>
        </tr>
        <tr>
            <td>java</td>
            <td>8/10</td>
            <td>1 year</td>
            <td>3</td>
        </tr>
    </table>
