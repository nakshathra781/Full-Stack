<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iframe tag practice</title>
    </head>
    <!--iframe allows you to embed another page in present page! 
    src attribute specifies url of the content to be embedded
    height and width attribute should be specified-->
    <iframe width="560" height="315" src="https://www.youtube.com/embed/cKRnbP6dZwc?si=2sWYjKSkXD1W4GWM" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe><hr><br>
<iframe src="https://www.wikipedia.org/" width="300" height="150"></iframe>
