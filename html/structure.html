<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>page structure practice</title>
</head>
<body>
    <header>
        <h1>header</h1>
        <p>welcome to header</p>
        <nav>
            <a href = "#h3">h3</a>
            <a href = "#h4">h4</a>
        </nav>
    </header>
    <main>
          <h2>this is main</h2>
        <section>
            <article>
                <h3>this is an article in section part</h3>
            </article>
            <article>
               <h4>this is one more article in section part</h4>
            </article>
        </section>
        <aside>
            <p>this contains aside content like ads contacts etc in main section</p>
        </aside>
         </main>
        <footer>
            <h5>this is footer section</h5>
            <p>welcome to footer section</p>
        </footer>
   </body>
</html>
